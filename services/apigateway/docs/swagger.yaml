            $ref: '#/definitions/response.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Reset password by token
      tags:
      - auth
  /api/auth/send-code:
    post:
      consumes:
      - application/json
      description: Sends a verification code to the provided email.
      parameters:
