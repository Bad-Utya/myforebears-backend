env: "local"
grpc:
  port: 50055
  timeout: 10h
postgres:
  host: "postgres"
  port: 5432
  username: "from-env"
  password: "from-env"
  database: "visualisation_local_db"
s3:
  endpoint: "http://minio:9000"
  region: "us-east-1"
  bucket: "myforebears-visualisations"
  access_key_id: "from-env"
  secret_access_key: "from-env"
  force_path_style: true
familytree:
  address: "familytree:50052"
  timeout: 5s
  retries_count: 3
