syntax = "proto3";

package familytree;

option go_package = "github.com/Bad-Utya/myforebears-backend/gen/go/familytree;familytreepb";

enum Gender {
    GENDER_UNSPECIFIED = 0;
    GENDER_MALE = 1;
    GENDER_FEMALE = 2;
}

enum RelationshipType {
    RELATIONSHIP_TYPE_UNSPECIFIED = 0;
    RELATIONSHIP_PARENT_CHILD = 1;
    RELATIONSHIP_PARTNER = 2;
    RELATIONSHIP_PARTNER_UNMARRIED = 3;
    RELATIONSHIP_PARTNER_MARRIED = 4;
    RELATIONSHIP_PARTNER_DIVORCED = 5;
}

enum PartnerRelationshipStatus {
    PARTNER_RELATIONSHIP_STATUS_UNSPECIFIED = 0;
    PARTNER_RELATIONSHIP_STATUS_UNMARRIED = 1;
    PARTNER_RELATIONSHIP_STATUS_MARRIED = 2;
    PARTNER_RELATIONSHIP_STATUS_DIVORCED = 3;
}

enum RelationDirection {
    RELATION_DIRECTION_UNSPECIFIED = 0;
    RELATION_DIRECTION_OUTGOING = 1;
    RELATION_DIRECTION_INCOMING = 2;
}

enum ParentRole {
    PARENT_ROLE_UNSPECIFIED = 0;
    PARENT_ROLE_FATHER = 1;
    PARENT_ROLE_MOTHER = 2;
}

message Tree {
    string id = 1;
    int32 creator_id = 2;
    int64 created_at_unix = 3;
    bool is_view_restricted = 4;
    bool is_public_on_main_page = 5;
}

message Person {
    string id = 1;
    string tree_id = 2;
    string first_name = 3;
    string last_name = 4;
    string patronymic = 5;
    Gender gender = 6;
    string avatar_photo_id = 7;
}

message Relationship {
    string person_id_from = 1;
    string person_id_to = 2;
    RelationshipType type = 3;
}

message Relative {
    Person person = 1;
    RelationshipType relationship_type = 2;
    RelationDirection direction = 3;
}

service FamilyTreeService {
    rpc CreateTree (CreateTreeRequest) returns (CreateTreeResponse);
    rpc ListTreesByCreator (ListTreesByCreatorRequest) returns (ListTreesByCreatorResponse);

    rpc AddParent (AddParentRequest) returns (AddParentResponse);
    rpc AddChild (AddChildRequest) returns (AddChildResponse);
    rpc AddPartner (AddPartnerRequest) returns (AddPartnerResponse);
    rpc UpdatePersonName (UpdatePersonNameRequest) returns (UpdatePersonNameResponse);
    rpc UpdatePersonAvatarPhoto (UpdatePersonAvatarPhotoRequest) returns (UpdatePersonAvatarPhotoResponse);
    rpc DeletePersonInTree (DeletePersonInTreeRequest) returns (DeletePersonInTreeResponse);

    rpc CreatePerson (CreatePersonRequest) returns (CreatePersonResponse);
    rpc GetPerson (GetPersonRequest) returns (GetPersonResponse);
    rpc GetPersonInTree (GetPersonInTreeRequest) returns (GetPersonInTreeResponse);
    rpc ListPersonsByTree (ListPersonsByTreeRequest) returns (ListPersonsByTreeResponse);
    rpc UpdatePerson (UpdatePersonRequest) returns (UpdatePersonResponse);
    rpc DeletePerson (DeletePersonRequest) returns (DeletePersonResponse);

    rpc AddRelationship (AddRelationshipRequest) returns (AddRelationshipResponse);
    rpc RemoveRelationship (RemoveRelationshipRequest) returns (RemoveRelationshipResponse);
    rpc GetRelatives (GetRelativesRequest) returns (GetRelativesResponse);
    rpc GetTree (GetTreeRequest) returns (GetTreeResponse);
    rpc GetTreeContent (GetTreeContentRequest) returns (GetTreeContentResponse);
    rpc GetTreeAccessInfo (GetTreeAccessInfoRequest) returns (GetTreeAccessInfoResponse);
    rpc IsTreeAccessEmailAllowed (IsTreeAccessEmailAllowedRequest) returns (IsTreeAccessEmailAllowedResponse);
    rpc AddTreeAccessEmail (AddTreeAccessEmailRequest) returns (AddTreeAccessEmailResponse);
    rpc ListTreeAccessEmails (ListTreeAccessEmailsRequest) returns (ListTreeAccessEmailsResponse);
    rpc DeleteTreeAccessEmail (DeleteTreeAccessEmailRequest) returns (DeleteTreeAccessEmailResponse);
    rpc ValidatePersonsInTree (ValidatePersonsInTreeRequest) returns (ValidatePersonsInTreeResponse);
    rpc UpdatePartnerRelationshipStatus (UpdatePartnerRelationshipStatusRequest) returns (UpdatePartnerRelationshipStatusResponse);
    rpc UpdateTreeSettings (UpdateTreeSettingsRequest) returns (UpdateTreeSettingsResponse);
}

message CreateTreeRequest {
    int32 request_user_id = 1;
}

message CreateTreeResponse {
    Tree tree = 1;
    Person root_person = 2;
}

message ListTreesByCreatorRequest {
    int32 request_user_id = 1;
}

message ListTreesByCreatorResponse {
    repeated Tree trees = 1;
}

message AddParentRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    string child_id = 3;
    ParentRole role = 4;
    string first_name = 5;
    string last_name = 6;
    string patronymic = 7;
}

message AddParentResponse {
    Person parent = 1;
    Person auto_created_second_parent = 2;
}

message AddChildRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    string parent1_id = 3;
    string parent2_id = 4;
    string first_name = 5;
    string last_name = 6;
    string patronymic = 7;
    Gender gender = 8;
}

message AddChildResponse {
    Person child = 1;
    Person auto_created_parent = 2;
}

message AddPartnerRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    string person_id = 3;
    string first_name = 4;
    string last_name = 5;
    string patronymic = 6;
}

message AddPartnerResponse {
    Person partner = 1;
}

message UpdatePersonNameRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    string person_id = 3;
    string first_name = 4;
    string last_name = 5;
    string patronymic = 6;
}

message UpdatePersonNameResponse {
    Person person = 1;
}

message UpdatePersonAvatarPhotoRequest {
    int32 request_user_id = 1;
    string person_id = 2;
    string avatar_photo_id = 3;
}

message UpdatePersonAvatarPhotoResponse {
    Person person = 1;
}

message DeletePersonInTreeRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    string person_id = 3;
}

message DeletePersonInTreeResponse {}

message CreatePersonRequest {
    string tree_id = 1;
    string first_name = 2;
    string last_name = 3;
    string patronymic = 4;
    Gender gender = 5;
}

message CreatePersonResponse {
    Person person = 1;
}

message GetPersonRequest {
    string person_id = 1;
}

message GetPersonResponse {
    Person person = 1;
}

message GetPersonInTreeRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    string person_id = 3;
}

message GetPersonInTreeResponse {
    Person person = 1;
}

message ListPersonsByTreeRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
}

message ListPersonsByTreeResponse {
    repeated Person persons = 1;
}

message UpdatePersonRequest {
    string person_id = 1;
    string first_name = 2;
    string last_name = 3;
    string patronymic = 4;
    Gender gender = 5;
}

message UpdatePersonResponse {
    Person person = 1;
}

message DeletePersonRequest {
    string person_id = 1;
}

message DeletePersonResponse {}

message AddRelationshipRequest {
    string person_id_from = 1;
    string person_id_to = 2;
    RelationshipType type = 3;
}

message AddRelationshipResponse {}

message RemoveRelationshipRequest {
    string person_id_from = 1;
    string person_id_to = 2;
    RelationshipType type = 3;
}

message RemoveRelationshipResponse {}

message GetRelativesRequest {
    string person_id = 1;
}

message GetRelativesResponse {
    repeated Relative relatives = 1;
}

message GetTreeRequest {
    string tree_id = 1;
    int32 request_user_id = 2;
}

message GetTreeResponse {
    Tree tree = 1;
}

message GetTreeContentRequest {
    string tree_id = 1;
    int32 request_user_id = 2;
}

message GetTreeContentResponse {
    repeated Person persons = 1;
    repeated Relationship relationships = 2;
}

message GetTreeAccessInfoRequest {
    string tree_id = 1;
}

message GetTreeAccessInfoResponse {
    Tree tree = 1;
}

message IsTreeAccessEmailAllowedRequest {
    string tree_id = 1;
    string email = 2;
}

message IsTreeAccessEmailAllowedResponse {
    bool allowed = 1;
}

message AddTreeAccessEmailRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    string email = 3;
}

message AddTreeAccessEmailResponse {}

message ListTreeAccessEmailsRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
}

message ListTreeAccessEmailsResponse {
    repeated string emails = 1;
}

message DeleteTreeAccessEmailRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    string email = 3;
}

message DeleteTreeAccessEmailResponse {}

message ValidatePersonsInTreeRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    repeated string person_ids = 3;
}

message ValidatePersonsInTreeResponse {}

message UpdatePartnerRelationshipStatusRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    string person_id1 = 3;
    string person_id2 = 4;
    PartnerRelationshipStatus status = 5;
}

message UpdatePartnerRelationshipStatusResponse {}

message UpdateTreeSettingsRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    bool is_view_restricted = 3;
    bool is_public_on_main_page = 4;
}

message UpdateTreeSettingsResponse {
    Tree tree = 1;
}
