syntax = "proto3";

package familytree;

option go_package = "github.com/Bad-Utya/myforebears-backend/gen/go/familytree;familytreepb";

enum Gender {
    GENDER_UNSPECIFIED = 0;
    GENDER_MALE = 1;
    GENDER_FEMALE = 2;
}

enum RelationshipType {
    RELATIONSHIP_TYPE_UNSPECIFIED = 0;
    RELATIONSHIP_PARENT_CHILD = 1;
    RELATIONSHIP_PARTNER = 2;
    RELATIONSHIP_PARTNER_UNMARRIED = 3;
    RELATIONSHIP_PARTNER_MARRIED = 4;
    RELATIONSHIP_PARTNER_DIVORCED = 5;
}

enum PartnerRelationshipStatus {
    PARTNER_RELATIONSHIP_STATUS_UNSPECIFIED = 0;
    PARTNER_RELATIONSHIP_STATUS_UNMARRIED = 1;
    PARTNER_RELATIONSHIP_STATUS_MARRIED = 2;
    PARTNER_RELATIONSHIP_STATUS_DIVORCED = 3;
}

enum RelationDirection {
    RELATION_DIRECTION_UNSPECIFIED = 0;
    RELATION_DIRECTION_OUTGOING = 1;
    RELATION_DIRECTION_INCOMING = 2;
}

enum ParentRole {
    PARENT_ROLE_UNSPECIFIED = 0;
    PARENT_ROLE_FATHER = 1;
    PARENT_ROLE_MOTHER = 2;
}

message Tree {
    string id = 1;
    int32 creator_id = 2;
    int64 created_at_unix = 3;
    bool is_view_restricted = 4;
    bool is_public_on_main_page = 5;
    string name = 6;
    string root_person_id = 7;
    string description = 8;
    repeated Tag tags = 9;
    double similarity_score = 10;
}

message Tag {
    string code = 1;
    string name = 2;
    string description = 3;
}

message Person {
    string id = 1;
    string tree_id = 2;
    string first_name = 3;
    string last_name = 4;
    string patronymic = 5;
    Gender gender = 6;
    string avatar_photo_id = 7;
    string biography = 8;
}

message PublicPersonEvent {
    string id = 1;
    string public_person_id = 2;
    string source_event_id = 3;
    string event_type_id = 4;
    string event_type_name = 5;
    string date_iso = 6;
    string date_precision = 7;
    string date_bound = 8;
    bool date_unknown = 9;
}

message PublicPerson {
    string id = 1;
    int32 owner_user_id = 2;
    string first_name = 3;
    string last_name = 4;
    string patronymic = 5;
    Gender gender = 6;
    string biography = 7;
    string avatar_photo_id = 8;
    int64 created_at_unix = 9;
    int64 updated_at_unix = 10;
    repeated PublicPersonEvent events = 11;
    repeated Tag tags = 12;
    double similarity_score = 13;
}

enum PublicPersonAttachment {
    PUBLIC_PERSON_ATTACHMENT_UNSPECIFIED = 0;
    PUBLIC_PERSON_ATTACHMENT_AS_PARENT = 1;
    PUBLIC_PERSON_ATTACHMENT_AS_CHILD = 2;
    PUBLIC_PERSON_ATTACHMENT_AS_PARTNER = 3;
}

message Relationship {
    string person_id_from = 1;
    string person_id_to = 2;
    RelationshipType type = 3;
}

message Relative {
    Person person = 1;
    RelationshipType relationship_type = 2;
    RelationDirection direction = 3;
}

service FamilyTreeService {
    rpc ListTags (ListTagsRequest) returns (ListTagsResponse);
    rpc SetTreeTags (SetTreeTagsRequest) returns (GetTreeResponse);
    rpc CreateTree (CreateTreeRequest) returns (CreateTreeResponse);
    rpc ListTreesByCreator (ListTreesByCreatorRequest) returns (ListTreesByCreatorResponse);
    rpc ListPublicTreesByCreator (ListPublicTreesByCreatorRequest) returns (ListPublicTreesByCreatorResponse);
    rpc ListRandomPublicTrees (ListRandomPublicTreesRequest) returns (ListRandomPublicTreesResponse);
    rpc SearchPublicTrees (SearchPublicTreesRequest) returns (SearchPublicTreesResponse);

    rpc AddParent (AddParentRequest) returns (AddParentResponse);
    rpc AddChild (AddChildRequest) returns (AddChildResponse);
    rpc AddPartner (AddPartnerRequest) returns (AddPartnerResponse);
    rpc UpdatePersonName (UpdatePersonNameRequest) returns (UpdatePersonNameResponse);
    rpc UpdatePersonAvatarPhoto (UpdatePersonAvatarPhotoRequest) returns (UpdatePersonAvatarPhotoResponse);
    rpc DeletePersonInTree (DeletePersonInTreeRequest) returns (DeletePersonInTreeResponse);

    rpc CreatePerson (CreatePersonRequest) returns (CreatePersonResponse);
    rpc GetPerson (GetPersonRequest) returns (GetPersonResponse);
    rpc ListPersonsByTree (ListPersonsByTreeRequest) returns (ListPersonsByTreeResponse);
    rpc UpdatePerson (UpdatePersonRequest) returns (UpdatePersonResponse);
    rpc DeletePerson (DeletePersonRequest) returns (DeletePersonResponse);

    rpc AddRelationship (AddRelationshipRequest) returns (AddRelationshipResponse);
    rpc RemoveRelationship (RemoveRelationshipRequest) returns (RemoveRelationshipResponse);
    rpc GetRelatives (GetRelativesRequest) returns (GetRelativesResponse);
    rpc GetTree (GetTreeRequest) returns (GetTreeResponse);
    rpc GetTreeContent (GetTreeContentRequest) returns (GetTreeContentResponse);
        rpc GetTreeContentWithinDepth (GetTreeContentWithinDepthRequest) returns (GetTreeContentResponse);
    rpc GetTreeAccessInfo (GetTreeAccessInfoRequest) returns (GetTreeAccessInfoResponse);
    rpc IsTreeAccessEmailAllowed (IsTreeAccessEmailAllowedRequest) returns (IsTreeAccessEmailAllowedResponse);
    rpc AddTreeAccessEmail (AddTreeAccessEmailRequest) returns (AddTreeAccessEmailResponse);
    rpc ListTreeAccessEmails (ListTreeAccessEmailsRequest) returns (ListTreeAccessEmailsResponse);
    rpc DeleteTreeAccessEmail (DeleteTreeAccessEmailRequest) returns (DeleteTreeAccessEmailResponse);
    rpc ValidatePersonsInTree (ValidatePersonsInTreeRequest) returns (ValidatePersonsInTreeResponse);
    rpc UpdatePartnerRelationshipStatus (UpdatePartnerRelationshipStatusRequest) returns (UpdatePartnerRelationshipStatusResponse);
    rpc UpdateTreeSettings (UpdateTreeSettingsRequest) returns (UpdateTreeSettingsResponse);
    rpc UpdateTreeRootPerson (UpdateTreeRootPersonRequest) returns (UpdateTreeRootPersonResponse);
    
    rpc ExportTreeGEDCOM (ExportTreeGEDCOMRequest) returns (ExportTreeGEDCOMResponse);
    rpc ImportTreeGEDCOM (ImportTreeGEDCOMRequest) returns (ImportTreeGEDCOMResponse);

    rpc CreatePublicPerson (CreatePublicPersonRequest) returns (PublicPersonResponse);
    rpc CreatePublicPersonSnapshot (CreatePublicPersonSnapshotRequest) returns (PublicPersonResponse);
    rpc GetPublicPerson (GetPublicPersonRequest) returns (PublicPersonResponse);
    rpc ListRandomPublicPersons (ListRandomPublicPersonsRequest) returns (PublicPersonsResponse);
    rpc ListPublicPersonsByOwner (ListPublicPersonsByOwnerRequest) returns (PublicPersonsResponse);
    rpc SearchPublicPersons (SearchPublicPersonsRequest) returns (PublicPersonsResponse);
    rpc SetPublicPersonTags (SetPublicPersonTagsRequest) returns (PublicPersonResponse);
    rpc UpdatePublicPerson (UpdatePublicPersonRequest) returns (PublicPersonResponse);
    rpc SetPublicPersonAvatarPhoto (SetPublicPersonAvatarPhotoRequest) returns (PublicPersonResponse);
    rpc DeletePublicPerson (DeletePublicPersonRequest) returns (DeletePublicPersonResponse);
    rpc ImportPublicPersonIntoTree (ImportPublicPersonIntoTreeRequest) returns (ImportPublicPersonIntoTreeResponse);
    rpc CreateTreeFromPublicPerson (CreateTreeFromPublicPersonRequest) returns (CreateTreeFromPublicPersonResponse);
}

message CreateTreeRequest {
    int32 request_user_id = 1;
    string description = 2;
    string name = 3;
}

message CreateTreeResponse {
    Tree tree = 1;
    Person root_person = 2;
}

message ListTreesByCreatorRequest {
    int32 request_user_id = 1;
}

message ListTreesByCreatorResponse {
    repeated Tree trees = 1;
}

message ListPublicTreesByCreatorRequest {
    int32 creator_id = 1;
}

message ListPublicTreesByCreatorResponse {
    repeated Tree trees = 1;
}

message ListRandomPublicTreesRequest {
    int32 limit = 1;
}

message ListRandomPublicTreesResponse {
    repeated Tree trees = 1;
}

message SearchPublicTreesRequest {
    string query = 1;
    int32 limit = 2;
    repeated string tag_codes = 3;
}

message SearchPublicTreesResponse {
    repeated Tree trees = 1;
}

message ListTagsRequest {}
message ListTagsResponse { repeated Tag tags = 1; }
message SetTreeTagsRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    repeated string tag_codes = 3;
}

message AddParentRequest {
    string tree_id = 1;
    string child_id = 2;
    ParentRole role = 3;
    string first_name = 4;
    string last_name = 5;
    string patronymic = 6;
}

message AddParentResponse {
    Person parent = 1;
    Person auto_created_second_parent = 2;
}

message AddChildRequest {
    string tree_id = 1;
    string parent1_id = 2;
    string parent2_id = 3;
    string first_name = 4;
    string last_name = 5;
    string patronymic = 6;
    Gender gender = 7;
}

message AddChildResponse {
    Person child = 1;
    Person auto_created_parent = 2;
}

message AddPartnerRequest {
    string tree_id = 1;
    string person_id = 2;
    string first_name = 3;
    string last_name = 4;
    string patronymic = 5;
}

message AddPartnerResponse {
    Person partner = 1;
}

message UpdatePersonNameRequest {
    string tree_id = 1;
    string person_id = 2;
    string first_name = 3;
    string last_name = 4;
    string patronymic = 5;
}

message UpdatePersonNameResponse {
    Person person = 1;
}

message UpdatePersonAvatarPhotoRequest {
    string person_id = 1;
    string avatar_photo_id = 2;
}

message UpdatePersonAvatarPhotoResponse {
    Person person = 1;
}

message DeletePersonInTreeRequest {
    string tree_id = 1;
    string person_id = 2;
}

message DeletePersonInTreeResponse {}

message CreatePersonRequest {
    string tree_id = 1;
    string first_name = 2;
    string last_name = 3;
    string patronymic = 4;
    Gender gender = 5;
    string biography = 6;
}

message CreatePersonResponse {
    Person person = 1;
}

message GetPersonRequest {
    string tree_id = 1;
    string person_id = 2;
}

message GetPersonResponse {
    Person person = 1;
}

message ListPersonsByTreeRequest {
    string tree_id = 1;
}

message ListPersonsByTreeResponse {
    repeated Person persons = 1;
}

message UpdatePersonRequest {
    string tree_id = 1;
    string person_id = 2;
    string first_name = 3;
    string last_name = 4;
    string patronymic = 5;
    Gender gender = 6;
    string biography = 7;
}

message UpdatePersonResponse {
    Person person = 1;
}

message DeletePersonRequest {
    string tree_id = 1;
    string person_id = 2;
}

message DeletePersonResponse {}

message AddRelationshipRequest {
    string tree_id = 1;
    string person_id_from = 2;
    string person_id_to = 3;
    RelationshipType type = 4;
}

message AddRelationshipResponse {}

message RemoveRelationshipRequest {
    string tree_id = 1;
    string person_id_from = 2;
    string person_id_to = 3;
    RelationshipType type = 4;
}

message RemoveRelationshipResponse {}

message GetRelativesRequest {
    string tree_id = 1;
    string person_id = 2;
}

message GetRelativesResponse {
    repeated Relative relatives = 1;
}

message GetTreeRequest {
    string tree_id = 1;
}

message GetTreeResponse {
    Tree tree = 1;
}

message GetTreeContentRequest {
    string tree_id = 1;
}

    message GetTreeContentWithinDepthRequest {
        string tree_id = 1;
        string root_person_id = 2;
        int32 max_depth = 3;
    }

message GetTreeContentResponse {
    string tree_id = 1;
    repeated Person persons = 2;
    repeated Relationship relationships = 3;
}

message GetTreeAccessInfoRequest {
    string tree_id = 1;
}

message GetTreeAccessInfoResponse {
    Tree tree = 1;
}

message IsTreeAccessEmailAllowedRequest {
    string tree_id = 1;
    string email = 2;
}

message IsTreeAccessEmailAllowedResponse {
    bool allowed = 1;
}

message AddTreeAccessEmailRequest {
    string tree_id = 1;
    string email = 2;
}

message AddTreeAccessEmailResponse {}

message ListTreeAccessEmailsRequest {
    string tree_id = 1;
}

message ListTreeAccessEmailsResponse {
    repeated string emails = 1;
}

message DeleteTreeAccessEmailRequest {
    string tree_id = 1;
    string email = 2;
}

message DeleteTreeAccessEmailResponse {}

message ValidatePersonsInTreeRequest {
    string tree_id = 1;
    repeated string person_ids = 2;
}

message ValidatePersonsInTreeResponse {}

message UpdatePartnerRelationshipStatusRequest {
    string tree_id = 1;
    string person_id1 = 2;
    string person_id2 = 3;
    PartnerRelationshipStatus status = 4;
}

message UpdatePartnerRelationshipStatusResponse {}

message UpdateTreeSettingsRequest {
    string tree_id = 1;
    bool is_view_restricted = 2;
    bool is_public_on_main_page = 3;
    string name = 4;
    string description = 5;
}

message UpdateTreeSettingsResponse {
    Tree tree = 1;
}

message UpdateTreeRootPersonRequest {
    string tree_id = 1;
    string root_person_id = 2;
}

message UpdateTreeRootPersonResponse {
    Tree tree = 1;
}

message ExportTreeGEDCOMRequest {
    string tree_id = 1;
    int32 request_user_id = 2;
}

message ExportTreeGEDCOMResponse {
    string gedcom_content = 1;
}

message ImportTreeGEDCOMRequest {
    string gedcom_content = 1;
    int32 request_user_id = 2;
}

message ImportTreeGEDCOMResponse {
    Tree tree = 1;
    int32 persons_imported = 2;
    int32 relationships_imported = 3;
    repeated string errors = 4;
}

message PublicPersonEventInput {
    string source_event_id = 1;
    string event_type_id = 2;
    string event_type_name = 3;
    string date_iso = 4;
    string date_precision = 5;
    string date_bound = 6;
    bool date_unknown = 7;
    string id = 8;
}

message CreatePublicPersonRequest {
    int32 request_user_id = 1;
}

message CreatePublicPersonSnapshotRequest {
    int32 request_user_id = 1;
    string first_name = 2;
    string last_name = 3;
    string patronymic = 4;
    Gender gender = 5;
    string biography = 6;
    repeated PublicPersonEventInput events = 7;
}

message GetPublicPersonRequest { string public_person_id = 1; }
message ListRandomPublicPersonsRequest { int32 limit = 1; }
message ListPublicPersonsByOwnerRequest { int32 owner_user_id = 1; int32 limit = 2; }
message SearchPublicPersonsRequest { string query = 1; int32 limit = 2; repeated string tag_codes = 3; }

message SetPublicPersonTagsRequest {
    int32 request_user_id = 1;
    string public_person_id = 2;
    repeated string tag_codes = 3;
}

message UpdatePublicPersonRequest {
    int32 request_user_id = 1;
    string public_person_id = 2;
    string first_name = 3;
    string last_name = 4;
    string patronymic = 5;
    Gender gender = 6;
    string biography = 7;
    repeated PublicPersonEventInput events = 8;
}

message PublicPersonResponse { PublicPerson person = 1; }
message PublicPersonsResponse { repeated PublicPerson persons = 1; }

message SetPublicPersonAvatarPhotoRequest {
    int32 request_user_id = 1;
    string public_person_id = 2;
    string avatar_photo_id = 3;
}

message DeletePublicPersonRequest {
    int32 request_user_id = 1;
    string public_person_id = 2;
}
message DeletePublicPersonResponse {}

message ImportPublicPersonIntoTreeRequest {
    int32 request_user_id = 1;
    string public_person_id = 2;
    string tree_id = 3;
    string attach_to_person_id = 4;
    PublicPersonAttachment attachment = 5;
}
message ImportPublicPersonIntoTreeResponse { Person person = 1; }

message CreateTreeFromPublicPersonRequest {
    int32 request_user_id = 1;
    string public_person_id = 2;
    string tree_name = 3;
}
message CreateTreeFromPublicPersonResponse { Tree tree = 1; Person person = 2; }
