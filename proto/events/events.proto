syntax = "proto3";

package events;

option go_package = "github.com/Bad-Utya/myforebears-backend/gen/go/events;eventspb";

enum PrimaryPersonsMode {
    PRIMARY_PERSONS_MODE_UNSPECIFIED = 0;
    PRIMARY_PERSONS_MODE_FIXED = 1;
    PRIMARY_PERSONS_MODE_UNLIMITED = 2;
}

enum EventDatePrecision {
    EVENT_DATE_PRECISION_UNSPECIFIED = 0;
    EVENT_DATE_PRECISION_DAY = 1;
    EVENT_DATE_PRECISION_MONTH = 2;
    EVENT_DATE_PRECISION_YEAR = 3;
}

enum EventDateBound {
    EVENT_DATE_BOUND_UNSPECIFIED = 0;
    EVENT_DATE_BOUND_EXACT = 1;
    EVENT_DATE_BOUND_NOT_BEFORE = 2;
    EVENT_DATE_BOUND_NOT_AFTER = 3;
}

message EventType {
    string id = 1;
    int32 owner_user_id = 2;
    bool is_system = 3;
    string name = 4;
    PrimaryPersonsMode primary_persons_mode = 5;
    int32 primary_persons_count = 6;
}

message Event {
    string id = 1;
    string tree_id = 2;
    string event_type_id = 3;
    repeated string primary_person_ids = 4;
    repeated string additional_person_ids = 5;
    string date_iso = 6;
    EventDatePrecision date_precision = 7;
    EventDateBound date_bound = 8;
    int64 created_at_unix = 9;
    int64 updated_at_unix = 10;
    bool date_unknown = 11;
    bool is_autogenerated = 12;
}

service EventsService {
    rpc CreateEventType (CreateEventTypeRequest) returns (CreateEventTypeResponse);
    rpc GetEventType (GetEventTypeRequest) returns (GetEventTypeResponse);
    rpc ListEventTypes (ListEventTypesRequest) returns (ListEventTypesResponse);
    rpc DeleteEventType (DeleteEventTypeRequest) returns (DeleteEventTypeResponse);
    rpc CreateEvent (CreateEventRequest) returns (CreateEventResponse);
    rpc GetEvent (GetEventRequest) returns (GetEventResponse);
    rpc ListEventsByTree (ListEventsByTreeRequest) returns (ListEventsByTreeResponse);
    rpc UpdateEvent (UpdateEventRequest) returns (UpdateEventResponse);
    rpc DeleteEvent (DeleteEventRequest) returns (DeleteEventResponse);
}

message CreateEventTypeRequest {
    int32 request_user_id = 1;
    string name = 2;
    PrimaryPersonsMode primary_persons_mode = 3;
    int32 primary_persons_count = 4;
}

message CreateEventTypeResponse {
    EventType event_type = 1;
}

message GetEventTypeRequest {
    int32 request_user_id = 1;
    string event_type_id = 2;
}

message GetEventTypeResponse {
    EventType event_type = 1;
}

message ListEventTypesRequest {
    int32 request_user_id = 1;
}

message ListEventTypesResponse {
    repeated EventType event_types = 1;
}

message DeleteEventTypeRequest {
    int32 request_user_id = 1;
    string event_type_id = 2;
}

message DeleteEventTypeResponse {}

message CreateEventRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    string event_type_id = 3;
    repeated string primary_person_ids = 4;
    repeated string additional_person_ids = 5;
    string date_iso = 6;
    EventDatePrecision date_precision = 7;
    EventDateBound date_bound = 8;
    bool date_unknown = 9;
    bool is_autogenerated = 10;
}

message CreateEventResponse {
    Event event = 1;
}

message GetEventRequest {
    int32 request_user_id = 1;
    string event_id = 2;
}

message GetEventResponse {
    Event event = 1;
}

message ListEventsByTreeRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
}

message ListEventsByTreeResponse {
    repeated Event events = 1;
}

message UpdateEventRequest {
    int32 request_user_id = 1;
    string event_id = 2;
    string event_type_id = 3;
    repeated string primary_person_ids = 4;
    repeated string additional_person_ids = 5;
    string date_iso = 6;
    EventDatePrecision date_precision = 7;
    EventDateBound date_bound = 8;
    bool date_unknown = 9;
}

message UpdateEventResponse {
    Event event = 1;
}

message DeleteEventRequest {
    int32 request_user_id = 1;
    string event_id = 2;
}

message DeleteEventResponse {}