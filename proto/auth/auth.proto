syntax = "proto3";

package auth;

option go_package = "github.com/Bad-Utya/myforebears-backend/gen/go/auth;authpb";

service Auth {
    rpc SendCode (SendCodeRequest) returns (SendCodeResponse);
    rpc Register (RegisterRequest) returns (RegisterResponse);
    rpc Login (LoginRequest) returns (LoginResponse);
    rpc SendLinkForResetPassword (SendLinkForResetPasswordRequest) returns (SendLinkForResetPasswordResponse);
    rpc ResetPasswordWithLink (ResetPasswordWithLinkRequest) returns (ResetPasswordWithLinkResponse);
    rpc ResetPasswordWithToken (ResetPasswordWithTokenRequest) returns (ResetPasswordWithTokenResponse);
    rpc RefreshTokens (RefreshTokensRequest) returns (RefreshTokensResponse);
    rpc Logout (LogoutRequest) returns (LogoutResponse);
    rpc LogoutFromAllDevices (LogoutFromAllDevicesRequest) returns (LogoutFromAllDevicesResponse);
    rpc GetUserInfo (GetUserInfoRequest) returns (GetUserInfoResponse);
    rpc GetMe (GetMeRequest) returns (GetMeResponse);
    rpc SearchUsers (SearchUsersRequest) returns (SearchUsersResponse);
    rpc UpdateNickname (UpdateNicknameRequest) returns (UpdateNicknameResponse);
    rpc UpdatePreferences (UpdatePreferencesRequest) returns (UpdatePreferencesResponse);
}

message User {
    int32 id = 1;
    string nickname = 2;
    int64 created_at_unix = 3;
}

message SendCodeRequest {
    string email = 1;
    string password = 2;
}

message SendCodeResponse {
    
}

message RegisterRequest {
    string email = 1;
    string code = 2;
}

message RegisterResponse {
    string access_token = 1;
    string refresh_token = 2;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
    string access_token = 1;
    string refresh_token = 2;
}

message SendLinkForResetPasswordRequest {
    string email = 1;
}

message SendLinkForResetPasswordResponse {

}

message ResetPasswordWithLinkRequest {
    string link = 1;
    string password = 2;
}

message ResetPasswordWithLinkResponse {

}

message ResetPasswordWithTokenRequest {
    string access_token = 1;
    string password = 2;
}

message ResetPasswordWithTokenResponse {

}

message RefreshTokensRequest {
    string refresh_token = 1;
}

message RefreshTokensResponse {
    string access_token = 1;
    string refresh_token = 2;
}

message LogoutRequest {
    string access_token = 1;
}

message LogoutResponse {

}

message LogoutFromAllDevicesRequest {
    string access_token = 1;
}

message LogoutFromAllDevicesResponse {
    
}

message GetUserInfoRequest {
    int32 user_id = 1;
}

message GetUserInfoResponse {
    User user = 1;
}

message GetMeRequest {
    int32 user_id = 1;
}

message GetMeResponse {
    User user = 1;
    string email = 2;
    string language = 3;
    string theme = 4;
}

message SearchUsersRequest {
    string query = 1;
    int32 limit = 2;
}

message SearchUsersResponse {
    repeated User users = 1;
}

message UpdateNicknameRequest {
    int32 user_id = 1;
    string nickname = 2;
}

message UpdateNicknameResponse {
    User user = 1;
}

message UpdatePreferencesRequest {
    int32 user_id = 1;
    string language = 2;
    string theme = 3;
}

message UpdatePreferencesResponse {
    User user = 1;
    string language = 2;
    string theme = 3;
}
