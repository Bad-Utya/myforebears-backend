syntax = "proto3";

package photos;

option go_package = "github.com/Bad-Utya/myforebears-backend/gen/go/photos;photospb";

message Photo {
    string id = 1;
    int32 owner_user_id = 2;
    string person_id = 3;
    string event_id = 4;
    bool is_user_avatar = 5;
    bool is_person_avatar = 6;
    string file_name = 7;
    string mime_type = 8;
    int64 size_bytes = 9;
    int64 created_at_unix = 10;
    string tree_id = 11;
    string public_person_id = 12;
    string public_event_id = 13;
}

service PhotosService {
    rpc UploadUserAvatar (UploadUserAvatarRequest) returns (UploadUserAvatarResponse);
    rpc GetUserAvatar (GetUserAvatarRequest) returns (GetPhotoContentResponse);

    rpc UploadTreeAvatar (UploadTreeAvatarRequest) returns (UploadTreeAvatarResponse);
    rpc GetTreeAvatar (GetTreeAvatarRequest) returns (GetPhotoContentResponse);

    rpc UploadPersonAvatar (UploadPersonAvatarRequest) returns (UploadPersonAvatarResponse);
    rpc GetPersonAvatar (GetPersonAvatarRequest) returns (GetPhotoContentResponse);
    rpc UploadPersonPhoto (UploadPersonPhotoRequest) returns (UploadPersonPhotoResponse);
    rpc ListPersonPhotos (ListPersonPhotosRequest) returns (ListPersonPhotosResponse);

    rpc UploadEventPhoto (UploadEventPhotoRequest) returns (UploadEventPhotoResponse);
    rpc ListEventPhotos (ListEventPhotosRequest) returns (ListEventPhotosResponse);

    rpc GetPhotoByID (GetPhotoByIDRequest) returns (GetPhotoContentResponse);
    rpc DeletePhotoByID (DeletePhotoByIDRequest) returns (DeletePhotoByIDResponse);

    rpc CopyPersonMediaToPublic (CopyPersonMediaToPublicRequest) returns (CopyMediaResponse);
    rpc CopyPublicPersonMediaToTree (CopyPublicPersonMediaToTreeRequest) returns (CopyMediaResponse);
    rpc UploadPublicPersonPhoto (UploadPublicPersonPhotoRequest) returns (UploadPersonPhotoResponse);
    rpc ListPublicPersonPhotos (ListPublicPersonPhotosRequest) returns (ListPersonPhotosResponse);
    rpc GetPublicPersonPhoto (GetPublicPersonPhotoRequest) returns (GetPhotoContentResponse);
    rpc DeletePublicPersonPhoto (DeletePublicPersonPhotoRequest) returns (DeletePhotoByIDResponse);
    rpc DeletePublicPersonMedia (DeletePublicPersonMediaRequest) returns (DeletePhotoByIDResponse);
}

message UploadUserAvatarRequest {
    int32 request_user_id = 1;
    string file_name = 2;
    string mime_type = 3;
    bytes content = 4;
}

message UploadUserAvatarResponse {
    Photo photo = 1;
}

message GetUserAvatarRequest {
    int32 request_user_id = 1;
}

message UploadTreeAvatarRequest {
    string tree_id = 1;
    string file_name = 2;
    string mime_type = 3;
    bytes content = 4;
}

message UploadTreeAvatarResponse {
    Photo photo = 1;
}

message GetTreeAvatarRequest {
    string tree_id = 1;
}

message UploadPersonAvatarRequest {
    string tree_id = 1;
    string person_id = 2;
    string file_name = 3;
    string mime_type = 4;
    bytes content = 5;
}

message UploadPersonAvatarResponse {
    Photo photo = 1;
}

message GetPersonAvatarRequest {
    string tree_id = 1;
    string person_id = 2;
}

message UploadPersonPhotoRequest {
    string tree_id = 1;
    string person_id = 2;
    string file_name = 3;
    string mime_type = 4;
    bytes content = 5;
}

message UploadPersonPhotoResponse {
    Photo photo = 1;
}

message ListPersonPhotosRequest {
    string tree_id = 1;
    string person_id = 2;
}

message ListPersonPhotosResponse {
    repeated Photo photos = 1;
}

message UploadEventPhotoRequest {
    string tree_id = 1;
    string event_id = 2;
    string file_name = 3;
    string mime_type = 4;
    bytes content = 5;
}

message UploadEventPhotoResponse {
    Photo photo = 1;
}

message ListEventPhotosRequest {
    string tree_id = 1;
    string event_id = 2;
}

message ListEventPhotosResponse {
    repeated Photo photos = 1;
}

message GetPhotoByIDRequest {
    string tree_id = 1;
    string photo_id = 2;
}

message GetPhotoContentResponse {
    Photo photo = 1;
    bytes content = 2;
}

message DeletePhotoByIDRequest {
    string tree_id = 1;
    string photo_id = 2;
}

message DeletePhotoByIDResponse {}

message EventPhotoMapping {
    string source_event_id = 1;
    string target_event_id = 2;
}

message CopyPersonMediaToPublicRequest {
    int32 request_user_id = 1;
    string tree_id = 2;
    string person_id = 3;
    string public_person_id = 4;
    repeated EventPhotoMapping event_mappings = 5;
}

message CopyPublicPersonMediaToTreeRequest {
    int32 request_user_id = 1;
    string public_person_id = 2;
    string tree_id = 3;
    string person_id = 4;
    repeated EventPhotoMapping event_mappings = 5;
}

message CopyMediaResponse { repeated Photo photos = 1; }

message UploadPublicPersonPhotoRequest {
    int32 request_user_id = 1;
    string public_person_id = 2;
    string file_name = 3;
    string mime_type = 4;
    bytes content = 5;
    bool is_avatar = 6;
}

message ListPublicPersonPhotosRequest { string public_person_id = 1; }
message GetPublicPersonPhotoRequest { string public_person_id = 1; string photo_id = 2; }
message DeletePublicPersonPhotoRequest { int32 request_user_id = 1; string public_person_id = 2; string photo_id = 3; }
message DeletePublicPersonMediaRequest { int32 request_user_id = 1; string public_person_id = 2; }
